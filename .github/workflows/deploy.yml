name: Publicar Dashboard Autofabricación

on:
  push:
    branches: [main]       # se actualiza en cada push
  workflow_dispatch:       # permite lanzarlo manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar dashboard HTML
        run: python3 scripts/generate_dashboard.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "auto: regenerar dashboard $(date +'%Y-%m-%d')"
          git push
